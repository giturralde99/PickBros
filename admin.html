// ── INIT ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    currentUser = session.user;
    await loadData();
    renderMain();
  } else {
    renderLogin();
  }
}

async function loadData() {
  const [resRes, lbRes, usersRes] = await Promise.all([
    sb.from('match_results').select('*'),
    sb.from('leaderboard').select('*').order('total_points', { ascending: false }),
    sb.auth.admin ? sb.auth.admin.listUsers() : { data: { users: [] } }
  ]);
  
  if (resRes.data) {
    results = {};
    resRes.data.forEach(r => { results[r.match_id] = { home: r.home_score, away: r.away_score }; });
  }
  if (lbRes.data) leaderboard = lbRes.data;
}

// ── CALCULATE POINTS ──
function calcPoints(predHome, predAway, realHome, realAway) {
  if (predHome === realHome && predAway === realAway) return POINTS.exact_score;
  const realWinner = realHome > realAway ? 'home' : realAway > realHome ? 'away' : 'draw';
  const predWinner = predHome > predAway ? 'home' : predAway > predHome ? 'away' : 'draw';
  if (realWinner === predWinner) return POINTS.correct_winner;
  return 0;
}

async function recalcAllPoints(matchId, homeScore, awayScore) {
  const { data: preds } = await sb.from('match_predictions')
    .select('*').eq('match_id', matchId);
  
  if (!preds || preds.length === 0) return 0;

  // Get previous result if exists (to subtract old points)
  const prevResult = results[matchId];

  let updated = 0;
  for (const pred of preds) {
    const predHome = pred.home_score;
    const predAway = pred.away_score;

    // Points for new result
    const newPts = calcPoints(predHome, predAway, homeScore, awayScore);
    
    // Points from old result (to subtract)
    const oldPts = prevResult ? calcPoints(predHome, predAway, prevResult.home, prevResult.away) : 0;
    
    const diff = newPts - oldPts;

    // Get or create leaderboard entry
    const { data: existing } = await sb.from('leaderboard')
      .select('*').eq('user_id', pred.user_id).maybeSingle();

    if (existing) {
      const newTotal = Math.max(0, existing.total_points + diff);
      const exactDiff = (newPts === POINTS.exact_score ? 1 : 0) - (oldPts === POINTS.exact_score ? 1 : 0);
      await sb.from('leaderboard').update({
        total_points: newTotal,
        correct_scores: Math.max(0, existing.correct_scores + exactDiff),
        updated_at: new Date().toISOString()
      }).eq('user_id', pred.user_id);
    } else if (newPts > 0) {
      await sb.from('leaderboard').insert({
        user_id: pred.user_id,
        display_name: pred.user_id,
        total_points: newPts,
        correct_scores: newPts === POINTS.exact_score ? 1 : 0,
        updated_at: new Date().toISOString()
      });
    }
    if (diff !== 0) updated++;
  }
  return updated;
}

// ── SAVE RESULT ──
async function saveResult(matchId, homeScore, awayScore) {
  // Check if result already exists - warn user
  const existing = results[matchId];
  if (existing) {
    if (!confirm(`Este partido ya tiene resultado (${existing.home}-${existing.away}). ¿Deseas actualizarlo? Nota: los puntos anteriores no se reversan automaticamente.`)) return;
  }

  const { error } = await sb.from('match_results').upsert({
    match_id: matchId,
    home_score: homeScore,
    away_score: awayScore,
    updated_at: new Date().toISOString()
  }, { onConflict: 'match_id' });

  if (error) { showToast('❌ Error: ' + error.message); return; }

  results[matchId] = { home: homeScore, away: awayScore };
  const updated = await recalcAllPoints(matchId, homeScore, awayScore);
  await loadData();
  showToast(`✅ Resultado guardado · ${updated} usuarios actualizados`);
  renderMain();
}

// ── TOAST ──
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value.trim();
  const err = document.getElementById('err');
  
  if (!email || !pass) { err.textContent = 'Completa todos los campos'; return; }
  
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error || data.user.email !== ADMIN_EMAIL) {
    err.textContent = 'Acceso denegado';
    await sb.auth.signOut();
    return;
  }
  currentUser = data.user;
  await loadData();
  renderMain();
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  renderLogin();
}

// ── RENDER LOGIN ──
function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div style="text-align:center;margin-bottom:8px">
      <div class="logo" style="justify-content:center">
        <span>PICK</span><span>BROS</span>
        <span class="admin-badge">ADMIN</span>
      </div>
    </div>
    <div class="login-card">
      <h2>Panel de Control</h2>
      <p>Solo administradores autorizados</p>
      <div id="err" class="err"></div>
      <input id="email" type="email" placeholder="Correo admin" value="admin@pickbros.com"/>
      <input id="pass" type="password" placeholder="Contrasena" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn" onclick="doLogin()">Entrar</button>
    </div>
  `;
}

// ── RENDER MAIN ──
function renderMain() {
  const totalResults = Object.keys(results).length;
  const totalMatches = MATCHES.length;
  const topPlayer = leaderboard[0];

  const jornadas = [1,2,3];
  const jornadaMatches = MATCHES.filter(m => m.jornada === activeJornada);
  const resultados = Object.keys(results).length;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="logo">
        <span>PICK</span><span>BROS</span>
        <span class="admin-badge">ADMIN</span>
      </div>
      <button class="btn secondary" style="width:auto;padding:8px 16px;font-size:13px" onclick="doLogout()">Cerrar sesion</button>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num">${totalResults}</div>
        <div class="stat-label">Resultados</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${totalMatches - totalResults}</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">${leaderboard.length}</div>
        <div class="stat-label">Jugadores</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${activeTab==='matches'?'active':''}" onclick="switchTab('matches')">⚽ Partidos</button>
      <button class="tab ${activeTab==='leaderboard'?'active':''}" onclick="switchTab('leaderboard')">🏆 Tabla</button>
    </div>

    <div id="tab-content">
      ${activeTab === 'matches' ? renderMatchesTab(jornadaMatches) : renderLeaderboardTab()}
    </div>
  `;
}

function renderMatchesTab(jornadaMatches) {
  const jornadaBtns = [1,2,3].map(j => 
    `<button class="tab ${activeJornada===j?'active':''}" onclick="switchJornada(${j})" style="font-size:12px;padding:6px 14px">Jornada ${j}</button>`
  ).join('');

  const cards = jornadaMatches.map(m => {
    const res = results[m.id];
    const hasResult = res !== undefined;
    return `
      <div class="match-card ${hasResult?'has-result':''}">
        <div class="match-meta">Grupo ${m.group} · ${m.date}</div>
        <div class="match-teams">
          <div class="team">
            <span class="team-flag">${m.homeFlag}</span>
            <span class="team-name">${m.homeName}</span>
          </div>
          <div class="score-area">
            <input class="score-input" id="h${m.id}" type="number" min="0" max="20" value="${hasResult ? res.home : ''}" placeholder="0"/>
            <span class="score-sep">—</span>
            <input class="score-input" id="a${m.id}" type="number" min="0" max="20" value="${hasResult ? res.away : ''}" placeholder="0"/>
          </div>
          <div class="team">
            <span class="team-flag">${m.awayFlag}</span>
            <span class="team-name">${m.awayName}</span>
          </div>
        </div>
        ${hasResult ? `<div class="result-badge">✅ Guardado: ${res.home} — ${res.away}</div>` : ''}
        <button class="confirm-btn" onclick="confirmResult(${m.id})">
          ${hasResult ? '✏️ Actualizar resultado' : '✅ Confirmar resultado'}
        </button>
      </div>
    `;
  }).join('');

  return `
    <div class="section-title">Capturar Resultados</div>
    <div class="tabs" style="margin-bottom:20px">${jornadaBtns}</div>
    ${cards}
  `;
}

function renderLeaderboardTab() {
  if (leaderboard.length === 0) {
    return `<div class="section-title">Tabla de Posiciones</div><div class="empty">No hay puntos registrados aun</div>`;
  }
  const medals = ['🥇','🥈','🥉'];
  const cards = leaderboard.map((p, i) => `
    <div class="lb-card">
      <div class="lb-rank">${medals[i] || (i+1)}</div>
      <div class="lb-name">${p.display_name || p.user_id.substring(0,8)}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-right:12px">${p.correct_scores} exactos</div>
      <div class="lb-pts">${p.total_points} <span>pts</span></div>
    </div>
  `).join('');
  return `<div class="section-title">Tabla de Posiciones</div>${cards}`;
}

function switchTab(tab) {
  activeTab = tab;
  renderMain();
}

function switchJornada(j) {
  activeJornada = j;
  renderMain();
}

async function confirmResult(matchId) {
  const h = parseInt(document.getElementById('h'+matchId).value);
  const a = parseInt(document.getElementById('a'+matchId).value);
  if (isNaN(h) || isNaN(a)) { showToast('⚠️ Ingresa el marcador completo'); return; }
  await saveResult(matchId, h, a);
}

init();
</script>
