const PICKS_DEADLINE = new Date('2026-06-11T05:59:00Z'); // UTC equivalent

const isPicksLocked = () => new Date() > PICKS_DEADLINE;

const isMatchLocked = (dateStr) => {
  // dateStr format: "11 Jun · 13:00"
  try {
    const parts = dateStr.split(' · ');
    const datePart = parts[0]; // "11 Jun"
    const timePart = parts[1]; // "13:00"
    const [day, monthStr] = datePart.split(' ');
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11,
                    Ene:0,Feb:1,Mar:2,Abr:3,May:4,Jun:5,Jul:6,Ago:7,Sep:8,Oct:9,Nov:10,Dic:11};
    const month = months[monthStr];
    const [hours, minutes] = timePart.split(':').map(Number);
    // Monterrey UTC-6 → add 6 hours to get UTC
    const matchUTC = new Date(Date.UTC(2026, month, parseInt(day), hours + 6, minutes, 0));
    return new Date() >= matchUTC;
  } catch(e) { return false; }
};

function TeamFlag({id, size='md', showName=true, align='left', slot}) {
  const t = id ? teamById(id) : null;
  const S = {sm:{f:'1.25rem',n:'0.68rem'},md:{f:'1.85rem',n:'0.78rem'},lg:{f:'2.5rem',n:'0.9rem'},xl:{f:'3.5rem',n:'1rem'}}[size]||{f:'1.85rem',n:'0.78rem'};
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:align==='right'?'flex-end':'flex-start',gap:'3px'}}>
      <span style={{fontSize:S.f,lineHeight:1}}>{t ? t.flag : '🏳️'}</span>
      {showName && (
        <span style={{fontSize:S.n,color:t?'var(--text)':'var(--sub)',fontWeight:500,textAlign:align==='right'?'right':'left',lineHeight:1.2,maxWidth:'78px',wordBreak:'break-word'}}>
          {t ? t.name : (slot||'TBD')}
        </span>
      )}
    </div>
  );
}

function MatchCard({match, prediction, onTap, compact}) {
  const has = prediction != null;
  const locked = isMatchLocked(match.date);
  const p = compact ? '9px 12px' : '13px 15px';
  return (
    <div onClick={()=>!locked&&onTap&&onTap(match)}
      style={{background:'var(--surface)',borderRadius:'13px',padding:p,display:'flex',alignItems:'center',gap:'8px',border:has?'1px solid var(--accent-dim)':'1px solid var(--border)',cursor:locked?'default':onTap?'pointer':'default',position:'relative',transition:'opacity .15s',opacity:locked&&!has?0.5:1}}>
      <div style={{flex:1}}><TeamFlag id={match.home} size={compact?'sm':'md'} align="left" slot={match.slotHome}/></div>
      <div style={{textAlign:'center',minWidth:'70px',flexShrink:0}}>
        {has ? (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'4px'}}>
            <span style={{fontSize:compact?'1.2rem':'1.45rem',fontWeight:800,color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>{prediction.home}</span>
            <span style={{color:'var(--sub)',fontSize:'0.75rem',fontWeight:300}}>—</span>
            <span style={{fontSize:compact?'1.2rem':'1.45rem',fontWeight:800,color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>{prediction.away}</span>
          </div>
        ) : (
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'6px'}}>
            <span style={{fontSize:'0.95rem',color:'var(--sub2)'}}>?</span>
            <span style={{color:'var(--sub2)',fontSize:'0.65rem'}}>—</span>
            <span style={{fontSize:'0.95rem',color:'var(--sub2)'}}>?</span>
          </div>
        )}
        <div style={{fontSize:'0.58rem',color:'var(--sub)',marginTop:'4px',lineHeight:1.5}}>
          {match.group ? `Grupo ${match.group}` : ''}<br/>{match.date}
        </div>
      </div>
      <div style={{flex:1,display:'flex',justifyContent:'flex-end'}}><TeamFlag id={match.away} size={compact?'sm':'md'} align="right" slot={match.slotAway}/></div>
      {has && !locked && <div style={{position:'absolute',top:'7px',right:'7px',width:'5px',height:'5px',borderRadius:'50%',background:'var(--accent)'}}/>}
      {locked && <div style={{position:'absolute',top:'6px',right:'6px',fontSize:'0.6rem'}}>🔒</div>}
    </div>
  );
}

function ScoreModal({match, initial, onConfirm, onClose}) {

  const [a, setA] = useState(initial?.away ?? 0);
  if (!match) return null;
  const HT = match.home ? teamById(match.home) : null;
  const AT = match.away ? teamById(match.away) : null;
  const clamp = v => Math.max(0, Math.min(9, v));
  const btnStyle = {width:'44px',height:'44px',borderRadius:'50%',background:'var(--surface2)',border:'none',color:'var(--text)',fontSize:'1.25rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0};
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:100}}/>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'430px',background:'var(--surface)',borderRadius:'24px 24px 0 0',padding:'20px 24px 48px',zIndex:200,boxShadow:'0 -20px 60px rgba(0,0,0,0.7)',maxHeight:'92vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px'}}>
          <div style={{width:'36px',height:'4px',background:'var(--border)',borderRadius:'2px',margin:'0 auto'}}/>
          <button onClick={onClose} style={{position:'absolute',right:'16px',top:'16px',background:'var(--surface2)',border:'none',color:'var(--sub)',fontSize:'1.1rem',width:'32px',height:'32px',borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </div>
        <div style={{textAlign:'center',marginBottom:'22px'}}>
          <div style={{fontSize:'0.62rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.1em'}}>{match.group?`Grupo ${match.group} · `:''}{match.date}</div>
          <div style={{fontSize:'1rem',fontWeight:800,color:'var(--text)',marginTop:'4px',letterSpacing:'-0.02em'}}>Pronostica el marcador</div>
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-around',marginBottom:'26px',gap:'12px'}}>
          {[[HT,match.slotHome,h,setH],[AT,match.slotAway,a,setA]].map((s,i)=>(
            <React.Fragment key={i}>
              {i===1 && <div style={{color:'var(--sub)',fontSize:'2rem',fontWeight:100,marginBottom:'48px',flexShrink:0}}>–</div>}
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',flex:1}}>
                <span style={{fontSize:'2.8rem',lineHeight:1}}>{s[0]?.flag||'🏳️'}</span>
                <span style={{fontSize:'0.72rem',color:'var(--sub)',textAlign:'center',maxWidth:'76px',lineHeight:1.3}}>{s[0]?.name||s[1]}</span>
                <button style={btnStyle} onClick={()=>s[3](clamp(s[2]+1))}>＋</button>
                <span style={{fontSize:'3rem',fontWeight:900,color:'var(--text)',lineHeight:1,fontVariantNumeric:'tabular-nums',minWidth:'2.5rem',textAlign:'center'}}>{s[2]}</span>
                <button style={btnStyle} onClick={()=>s[3](clamp(s[2]-1))}>－</button>
              </div>
            </React.Fragment>
          ))}
        </div>
        <div style={{background:'var(--surface2)',borderRadius:'11px',padding:'10px 14px',marginBottom:'14px',display:'flex',justifyContent:'space-around',fontSize:'0.68rem',color:'var(--sub)'}}>
          <span>✓ Ganador = <strong style={{color:'var(--accent)'}}>+1 pt</strong></span>
          <span>🎯 Exacto = <strong style={{color:'var(--accent)'}}>+3 pts</strong></span>
        </div>
        <button onClick={()=>onConfirm({home:h,away:a})} style={{width:'100%',padding:'16px',borderRadius:'14px',background:'var(--accent)',border:'none',color:'#000',fontSize:'1rem',fontWeight:800,cursor:'pointer',letterSpacing:'-0.01em'}}>
          Confirmar pronóstico
        </button>
      </div>
    </>
  );
}

function TeamPicker({title, exclude=[], onSelect, onClose}) {
  const [q, setQ] = useState('');
  const ref = useRef();
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(), 150); }, []);
  const filtered = TEAMS.filter(t => !exclude.includes(t.id) && (t.name.toLowerCase().includes(q.toLowerCase()) || t.id.includes(q.toUpperCase())));
  const byGroup = filtered.reduce((a,t)=>{ (a[t.group]=a[t.group]||[]).push(t); return a; }, {});
  return (
    <>
      <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:100}}/>
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'430px',height:'88vh',background:'var(--surface)',borderRadius:'24px 24px 0 0',zIndex:101,display:'flex',flexDirection:'column',boxShadow:'0 -20px 60px rgba(0,0,0,0.7)'}}>
        <div style={{padding:'16px 16px 0',flexShrink:0}}>
          <div style={{width:'36px',height:'4px',background:'var(--border)',borderRadius:'2px',margin:'0 auto 14px'}}/>
          <div style={{fontSize:'1rem',fontWeight:800,color:'var(--text)',textAlign:'center',marginBottom:'12px',letterSpacing:'-0.02em'}}>{title}</div>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar equipo…"
            style={{width:'100%',padding:'11px 14px',borderRadius:'12px',background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',fontSize:'0.9rem',outline:'none',boxSizing:'border-box'}}/>
        </div>
        <div style={{overflow:'auto',flex:1,padding:'6px 16px 32px'}}>
          {Object.entries(byGroup).map(([g,ts])=>(
            <div key={g}>
              <div style={{fontSize:'0.62rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.1em',fontWeight:700,padding:'14px 0 6px'}}>Grupo {g}</div>
              {ts.map(t=>(
                <div key={t.id} onClick={()=>onSelect(t)} style={{display:'flex',alignItems:'center',gap:'14px',padding:'12px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                  <span style={{fontSize:'1.9rem',lineHeight:1}}>{t.flag}</span>

                  </div>
                </div>
              ))}
            </div>
          ))}
          {!filtered.length && <div style={{textAlign:'center',color:'var(--sub)',padding:'40px 0'}}>Sin resultados</div>}
        </div>
      </div>
    </>
  );
}

function PredictionsWizard({onComplete, initPicks}) {
  // Check if picks are locked
  if(isPicksLocked()) {
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px',textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'16px'}}>🔒</div>
        <div style={{fontFamily:"'Black Han Sans',sans-serif",fontSize:'1.8rem',color:'var(--text)',marginBottom:'8px'}}>Picks cerrados</div>
        <div style={{color:'var(--sub)',fontSize:'0.9rem',lineHeight:1.6}}>El plazo para hacer tus picks del torneo cerro el 10 de junio a las 23:59. Suerte con tus pronosticos!</div>
      </div>
    );
  }
  const META = [
    {key:'champion', icon:'🥇',label:'¿Quién será el Campeón?',reward:'+15 pts'},
    {key:'runnerUp', icon:'🥈',label:'¿Quién será el Subcampeón?',reward:'+10 pts'},
    {key:'third',    icon:'🥉',label:'¿Quién gana el 3er lugar?',reward:'+5 pts'},
    {key:'topScorer',icon:'👟',label:'¿Quién será el Goleador?',reward:'+8 pts'},
  ];
  const [step,setStep] = useState(0);
  const [picks,setPicks] = useState(initPicks||{});
  const [picker,setPicker] = useState(false);
  const done = step >= META.length;
  const cur = META[step];
  const isScorer = cur?.key === 'topScorer';
  const sel = cur ? picks[cur.key] : null;
  const excl = META.filter(m=>m.key!==cur?.key&&m.key!=='topScorer').map(m=>picks[m.key]?.id).filter(Boolean);

  // For display: scorer has name+team, teams have flag+name+group
  const selTeam = sel && !isScorer ? teamById(sel.id)||sel : null;
  const selPlayer = sel && isScorer ? sel : null;
  const selPlayerTeam = selPlayer ? teamById(selPlayer.team) : null;

  if (done) return (
    <div style={{minHeight:'100vh',padding:'52px 24px 40px',display:'flex',flexDirection:'column'}}>
      <div style={{textAlign:'center',marginBottom:'28px'}}>
        <div style={{fontSize:'2.5rem',marginBottom:'10px'}}>🎯</div>
        <div style={{fontSize:'1.5rem',fontWeight:900,color:'var(--text)',letterSpacing:'-0.03em'}}>Mis Pronósticos</div>
        <div style={{fontSize:'0.78rem',color:'var(--sub)',marginTop:'4px'}}>Revisa y confirma antes de continuar</div>
      </div>
      {META.map(m=>{
        const p = picks[m.key];
        const isS = m.key==='topScorer';
        const pt = isS && p ? teamById(p.team) : null;
        return (
          <div key={m.key} onClick={()=>setStep(META.findIndex(x=>x.key===m.key))}
            style={{display:'flex',alignItems:'center',gap:'14px',padding:'16px',marginBottom:'10px',background:'var(--surface)',borderRadius:'14px',border:p?'1px solid var(--accent-dim)':'1px solid var(--border)',cursor:'pointer'}}>
            <span style={{fontSize:'1.75rem'}}>{m.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:'0.63rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.06em'}}>{m.label.replace(/¿|¡|\?|!/g,'')}</div>
              {p ? (
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'5px'}}>
                  <span style={{fontSize:'1.4rem'}}>{isS ? (pt?.flag||'👤') : p.flag}</span>
                  <div>
                    <div style={{fontWeight:700,color:'var(--text)',fontSize:'0.95rem'}}>{p.name}</div>
                    {isS && <div style={{fontSize:'0.68rem',color:'var(--sub)'}}>{pt?.name} · {p.club}</div>}
                  </div>
                  <span style={{fontSize:'0.7rem',color:'var(--accent)',fontWeight:700,marginLeft:'auto'}}>{m.reward}</span>
                </div>
              ) : <div style={{color:'var(--sub)',fontSize:'0.85rem',marginTop:'4px'}}>Sin selección</div>}
            </div>
            <span style={{color:'var(--sub)'}}>›</span>
          </div>
        );
      })}
      <div style={{flex:1}}/>
      <button onClick={()=>onComplete(picks)} style={{width:'100%',padding:'17px',borderRadius:'14px',background:'var(--accent)',border:'none',color:'#000',fontSize:'1rem',fontWeight:800,cursor:'pointer',marginTop:'24px',letterSpacing:'-0.01em'}}>
        Confirmar y ver jornadas →
      </button>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',padding:'52px 24px 0',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',gap:'6px',marginBottom:'52px'}}>
        {META.map((_,i)=><div key={i} style={{flex:1,height:'3px',borderRadius:'2px',background:i<=step?'var(--accent)':'var(--surface2)',transition:'background .3s'}}/>)}
      </div>
      <div style={{textAlign:'center',marginBottom:'44px'}}>
        <div style={{fontSize:'3.8rem',marginBottom:'14px',filter:sel?'drop-shadow(0 0 24px rgba(181,242,61,0.45))':''}}>{cur.icon}</div>
        <div style={{fontSize:'1.4rem',fontWeight:900,color:'var(--text)',letterSpacing:'-0.03em',lineHeight:1.3}}>{cur.label}</div>
        <div style={{fontSize:'0.78rem',color:'var(--accent)',marginTop:'8px',fontWeight:700}}>{cur.reward} si aciertas</div>
      </div>

      {/* Selected state */}
      {sel ? (
        isScorer ? (
          /* Player card */
          <div onClick={()=>setPicker(true)} style={{display:'flex',alignItems:'center',gap:'16px',padding:'20px',background:'var(--surface)',borderRadius:'18px',border:'2px solid var(--accent)',cursor:'pointer',marginBottom:'24px'}}>
            <span style={{fontSize:'3rem',lineHeight:1}}>{selPlayerTeam?.flag||'👤'}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:'1.1rem',color:'var(--text)',letterSpacing:'-0.02em'}}>{selPlayer.name}</div>
              <div style={{fontSize:'0.75rem',color:'var(--sub)',marginTop:'3px'}}>{selPlayerTeam?.name} · {selPlayer.club}</div>
              <div style={{fontSize:'0.68rem',color:'var(--accent)',marginTop:'2px',fontWeight:600}}>{selPlayer.pos}</div>
            </div>
            <div style={{fontSize:'0.72rem',color:'var(--sub)'}}>cambiar ›</div>
          </div>
        ) : (
          /* Team card */
          <div onClick={()=>setPicker(true)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'12px',padding:'28px',background:'var(--surface)',borderRadius:'18px',border:'2px solid var(--accent)',cursor:'pointer',marginBottom:'24px'}}>
            <span style={{fontSize:'4rem',lineHeight:1}}>{sel.flag}</span>
            <div style={{fontWeight:900,fontSize:'1.25rem',color:'var(--text)',letterSpacing:'-0.03em'}}>{sel.name}</div>
            <div style={{fontSize:'0.7rem',color:'var(--sub)'}}>Grupo {sel.group} · Toca para cambiar</div>
          </div>
        )
      ) : (
        <button onClick={()=>setPicker(true)} style={{width:'100%',padding:'42px 24px',background:'var(--surface)',border:'2px dashed var(--border)',borderRadius:'18px',color:'var(--sub)',cursor:'pointer',fontSize:'0.9rem',marginBottom:'24px',outline:'none'}}>
          + {isScorer ? 'Seleccionar jugador' : 'Seleccionar equipo'}
        </button>
      )}

      <div style={{flex:1}}/>
      <div style={{display:'flex',gap:'12px',paddingBottom:'20px'}}>
        {step>0 && <button onClick={()=>setStep(s=>s-1)} style={{flex:1,padding:'16px',borderRadius:'14px',background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text)',fontSize:'0.95rem',cursor:'pointer',outline:'none'}}>← Atrás</button>}
        <button onClick={()=>setStep(s=>s+1)} disabled={!sel} style={{flex:3,padding:'16px',borderRadius:'14px',background:sel?'var(--accent)':'var(--surface2)',border:'none',color:sel?'#000':'var(--sub)',fontSize:'1rem',fontWeight:800,cursor:sel?'pointer':'default',letterSpacing:'-0.01em',outline:'none'}}>
          {step===META.length-1?'Ver resumen →':'Siguiente →'}
        </button>
      </div>

      {picker && (
        isScorer
          ? <PlayerPicker onSelect={p=>{setPicks(prev=>({...prev,topScorer:p}));setPicker(false);}} onClose={()=>setPicker(false)}/>
          : <TeamPicker title={cur.label} exclude={excl} onSelect={t=>{setPicks(p=>({...p,[cur.key]:t}));setPicker(false);}} onClose={()=>setPicker(false)}/>
      )}
    </div>
  );
}

function MatchesScreen({matchPreds, onMatchTap, scoreModal, onScoreConfirm, onScoreClose, compact}) {
  // MatchesScreen
  const TABS = [
    {id:1,label:'Jornada 1',sub:'11–16 Jun',open:true},
    {id:2,label:'Jornada 2',sub:'17–22 Jun',open:false},
    {id:3,label:'Jornada 3',sub:'23–28 Jun',open:false},
    {id:'r16',label:'16vos',sub:'2–7 Jul',open:false},
    {id:'qf',label:'8vos',sub:'9–12 Jul',open:false},
    {id:'sf',label:'Semis',sub:'15–16 Jul',open:false},
    {id:'3rd',label:'3er Lugar',sub:'18 Jul',open:false},
    {id:'final',label:'Final',sub:'19 Jul',open:false},
  ];
  const [active,setActive] = useState(1);
  const allM = {1:MATCHES.filter(m=>m.jornada===1),2:MATCHES.filter(m=>m.jornada===2),3:MATCHES.filter(m=>m.jornada===3),r16:R16,qf:QF,sf:SF,'3rd':THIRD,final:FINAL};
  const cur = allM[active]||[];
  const info = TABS.find(t=>t.id===active);
  const predCnt = cur.filter(m=>matchPreds[m.id]).length;
  const byGroup = cur.reduce((a,m)=>{ const k=m.group||String(active).toUpperCase(); (a[k]=a[k]||[]).push(m); return a; },{});
  const grpLabel = k => ({R16:'16vos de Final',QF:'Cuartos de Final',SF:'Semifinales',FINAL:'Gran Final','3RD':'Tercer Lugar'}[k]||`Grupo ${k}`);

  return (
    <div style={{paddingBottom:'20px'}}>
      <div style={{padding:'20px 16px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontSize:'1.5rem',fontWeight:900,color:'var(--text)',letterSpacing:'-0.04em',marginBottom:'14px'}}>Jornadas</div>
        <div style={{display:'flex',gap:'8px',overflowX:'auto',paddingBottom:'12px'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActive(t.id)} style={{flexShrink:0,padding:'7px 14px',borderRadius:'20px',background:active===t.id?'var(--accent)':'var(--surface)',border:'1px solid '+(active===t.id?'transparent':'var(--border)'),color:active===t.id?'#000':t.open?'var(--text)':'var(--sub)',fontSize:'0.78rem',fontWeight:active===t.id?800:400,cursor:'pointer',whiteSpace:'nowrap',outline:'none'}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{padding:'11px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:'0.74rem',color:'var(--sub)'}}>{info?.sub}</div>
        {info?.open
          ? <div style={{fontSize:'0.74rem',color:'var(--accent)',fontWeight:700}}>{predCnt}/{cur.length} pronosticados</div>
          : <div style={{fontSize:'0.7rem',color:'var(--sub)'}}>🔒 Próximamente</div>}
      </div>
      <div style={{padding:'0 16px'}}>
        {Object.entries(byGroup).map(([g,ms])=>(
          <div key={g} style={{marginBottom:'22px'}}>
            <div style={{fontSize:'0.62rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.12em',fontWeight:700,marginBottom:'8px'}}>{grpLabel(g)}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {ms.map(m=><MatchCard key={m.id} match={m} prediction={matchPreds[m.id]} onTap={info?.open?onMatchTap:null} compact={compact}/>)}
            </div>
          </div>
        ))}
      </div>
      {scoreModal && <ScoreModal match={scoreModal} initial={matchPreds[scoreModal.id]} onConfirm={(s)=>onScoreConfirm(scoreModal.id,s)} onClose={onScoreClose}/>}
    </div>
  );
}

      <div style={{padding:'0 16px'}}>
        {LEADERBOARD.map((p,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 14px',marginBottom:'6px',background:p.isMe?'rgba(181,242,61,0.06)':'var(--surface)',borderRadius:'12px',border:p.isMe?'1px solid var(--accent-dim)':'1px solid var(--border)'}}>
            <div style={{width:'18px',textAlign:'center',fontWeight:800,color:i<3?'var(--accent)':'var(--sub)',fontSize:i<3?'1.05rem':'0.8rem'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':p.rank}</div>
            <div style={{width:'36px',height:'36px',borderRadius:'50%',background:'var(--surface2)',border:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.6rem',fontWeight:800,color:'var(--sub)',letterSpacing:'0.01em',flexShrink:0}}>{p.av}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:p.isMe?800:500,color:'var(--text)',fontSize:'0.88rem'}}>{p.name}{p.isMe?' (tú)':''}</div>
              <div style={{fontSize:'0.64rem',color:'var(--sub)'}}>0 pronósticos</div>
            </div>
            <div style={{fontWeight:800,color:i<3?'var(--accent)':'var(--text)',fontSize:'1rem',fontVariantNumeric:'tabular-nums'}}>{p.pts}<span style={{fontSize:'0.58rem',color:'var(--sub)',fontWeight:400,marginLeft:'2px'}}>pts</span></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ProfileScreen({user, picks, matchPreds}) {
  const profHeader = <ScreenHeader title='Perfil' subtitle={user?.name||''}/>;
  const done = Object.keys(matchPreds).length;
  const total = MATCHES.length;
  const pct = Math.round(done/total*100);
  return (
    <div style={{paddingBottom:'20px'}}>
      <div style={{padding:'24px 16px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:'16px'}}>
        <div style={{width:'58px',height:'58px',borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),rgba(0,230,118,0.3))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem',flexShrink:0}}>⚽</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,color:'var(--text)',fontSize:'1.1rem',letterSpacing:'-0.03em'}}>{user?.name||'Jugador'}</div>
          <div style={{color:'var(--sub)',fontSize:'0.75rem',marginTop:'2px'}}>{user?.email}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:'1.9rem',fontWeight:900,color:'var(--accent)',lineHeight:1,letterSpacing:'-0.05em'}}>0</div>
          <div style={{fontSize:'0.6rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.06em'}}>puntos</div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',padding:'16px'}}>
        {[{v:'#—',l:'Posición'},{v:`${done}/${total}`,l:'Pronósticos'},{v:'0',l:'Jornadas top'}].map((s,i)=>(
          <div key={i} style={{background:'var(--surface)',borderRadius:'13px',padding:'14px 8px',border:'1px solid var(--border)',textAlign:'center'}}>
            <div style={{fontSize:'1.1rem',fontWeight:900,color:'var(--text)',letterSpacing:'-0.03em'}}>{s.v}</div>
            <div style={{fontSize:'0.6rem',color:'var(--sub)',marginTop:'4px',lineHeight:1.3}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{padding:'0 16px 18px'}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
          <div style={{fontSize:'0.74rem',color:'var(--sub)'}}>Progreso de pronósticos</div>
          <div style={{fontSize:'0.74rem',color:'var(--accent)',fontWeight:700}}>{pct}%</div>
        </div>
        <div style={{height:'5px',background:'var(--surface2)',borderRadius:'3px',overflow:'hidden'}}>
          <div style={{height:'100%',width:pct+'%',background:'var(--accent)',borderRadius:'3px',transition:'width .6s ease'}}/>
        </div>
      </div>
      <div style={{padding:'0 16px'}}>
        <div style={{fontSize:'0.62rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,marginBottom:'10px'}}>Pronósticos Finales</div>
        {[{k:'champion',i:'🥇',l:'Campeón'},{k:'runnerUp',i:'🥈',l:'Subcampeón'},{k:'third',i:'🥉',l:'Tercer Lugar'},{k:'topScorer',i:'👟',l:'Goleador'}].map(({k,i,l})=>{
          const p = picks?.[k];
          const isS = k==='topScorer';
          const pt = isS && p ? teamById(p.team) : null;
          return (
            <div key={k} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 14px',marginBottom:'8px',background:'var(--surface)',borderRadius:'12px',border:p?'1px solid var(--accent-dim)':'1px solid var(--border)'}}>
              <span style={{fontSize:'1.3rem'}}>{i}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'0.62rem',color:'var(--sub)',textTransform:'uppercase',letterSpacing:'0.06em'}}>{l}</div>
                {p
                  ? <div style={{display:'flex',alignItems:'center',gap:'6px',marginTop:'3px'}}>
                      <span style={{fontSize:'1.1rem'}}>{isS ? (pt?.flag||'👤') : p.flag}</span>
                      <div><div style={{fontWeight:700,color:'var(--text)',fontSize:'0.9rem'}}>{p.name}</div>{isS && <div style={{fontSize:'0.65rem',color:'var(--sub)'}}>{pt?.name} · {p.club}</div>}</div>
                    </div>
                  : <div style={{color:'var(--sub)',fontSize:'0.82rem',marginTop:'3px'}}>—</div>}
              </div>
            </div>
          );
        })}
        <button onClick={()=>{supabase.auth.signOut().then(()=>window.location.reload());}} style={{width:'100%',padding:'14px',borderRadius:'13px',background:'none',border:'1px solid var(--border)',color:'var(--sub)',fontSize:'0.875rem',cursor:'pointer',marginTop:'12px',outline:'none'}}>
          Cerrar sesión
        </button>
      </div>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "verde",
  "density": "comoda"
}/*EDITMODE-END*/;
const ACCENTS = {
  verde:  {a:'#00E676',d:'rgba(0,230,118,0.15)'},
  dorado: {a:'#f5b731',d:'rgba(245,183,49,0.15)'},
  azul:   {a:'#38c4f0',d:'rgba(56,196,240,0.15)'},
};

function App() {
  const [tweaks,setTweaks] = useState(TWEAK_DEFAULTS);
  const [editMode,setEditMode] = useState(false);
  const [user,setUser] = useState(null);
  const [picks,setPicks] = useState(null);
  const [matchPreds,setMatchPreds] = useState({});
  const [loadingSession,setLoadingSession] = useState(true);
  const [screen,setScreen] = useState('loading');
  const [tab,setTab] = useState('matches');
  const [scoreModal,setScoreModal] = useState(null);

  // Cargar sesion de Supabase al iniciar
  useEffect(()=>{
    const init = async () => {
      const {data:{session}} = await supabase.auth.getSession();
      if(session){
        const u = {name:session.user.email.split('@')[0], email:session.user.email, id:session.user.id};
        setUser(u);

        // Cargar picks Y partidos en paralelo
        const [picksRes, mpRes] = await Promise.all([
          supabase.from('picks').select('*').eq('user_id',session.user.id).maybeSingle(),
          supabase.from('match_predictions').select('*').eq('user_id',session.user.id)
        ]);

        // Procesar picks
        const pd = picksRes.data;
        if(pd && pd.champion){
          try {
            const p = {
              champion:  JSON.parse(pd.champion),
              runnerUp:  JSON.parse(pd.runner_up),
              third:     JSON.parse(pd.third_place),
              topScorer: JSON.parse(pd.top_scorer),
            };
            setPicks(p);
            setScreen('main');
          } catch(e) {
            console.log('Error parseando picks:', e);
            setScreen('predictions');
          }
        } else {
          setScreen('predictions');
        }

        // Procesar pronosticos de partidos
        const mpd = mpRes.data;
        if(mpd && mpd.length > 0){
          const mp = {};
          mpd.forEach(p=>{ mp[p.match_id]={home:p.home_score, away:p.away_score}; });
          setMatchPreds(mp);
        }
      } else {
        setScreen('login');
      }
      setLoadingSession(false);
    };
    init();
    const {data:{subscription}} = supabase.auth.onAuthStateChange((_event,session)=>{
      if(!session){ setUser(null); setPicks(null); setMatchPreds({}); setScreen('login'); }
    });
    return ()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    const c = ACCENTS[tweaks.accentColor]||ACCENTS.verde;
    document.documentElement.style.setProperty('--accent',c.a);
    document.documentElement.style.setProperty('--accent-dim',c.d);
  },[tweaks.accentColor]);

  useEffect(()=>{
    const h = e=>{
      if(e.data?.type==='__activate_edit_mode') setEditMode(true);
      if(e.data?.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  const saveTw = next=>{ setTweaks(next); };
  const handleLogin = async u=>{
    setUser(u);
    setScreen('loading');
    // Cargar picks desde Supabase despues del login
    const [picksRes, mpRes] = await Promise.all([
      supabase.from('picks').select('*').eq('user_id',u.id).maybeSingle(),
      supabase.from('match_predictions').select('*').eq('user_id',u.id)
    ]);
    const pd = picksRes.data;
    if(pd && pd.champion){
      try {
        const p = {
          champion:  JSON.parse(pd.champion),
          runnerUp:  JSON.parse(pd.runner_up),
          third:     JSON.parse(pd.third_place),
          topScorer: JSON.parse(pd.top_scorer),
        };
        setPicks(p);
        setScreen('main');
      } catch(e) {
        setScreen('predictions');
      }
    } else {
      setScreen('predictions');
    }
    // Cargar pronosticos
    if(mpRes.data && mpRes.data.length > 0){
      const mp = {};
      mpRes.data.forEach(p=>{ mp[p.match_id]={home:p.home_score, away:p.away_score}; });
      setMatchPreds(mp);
    }
  };
  const handlePicks = async p=>{
    setPicks(p);
    setScreen('main'); setTab('matches');
    // Save to Supabase
    const {error:saveErr} = await supabase.from('picks').upsert({
      user_id:user.id,
      champion:JSON.stringify(p.champion),
      runner_up:JSON.stringify(p.runnerUp),
      third_place:JSON.stringify(p.third),
      top_scorer:JSON.stringify(p.topScorer),
      updated_at:new Date().toISOString()
    },{onConflict:'user_id'});
    console.log('Picks guardados:', saveErr ? 'ERROR: '+saveErr.message : 'OK');
  };
  const handleScore = async (id,s)=>{
    setMatchPreds(prev=>({...prev,[id]:s}));
    setScoreModal(null);
    // Save to Supabase
    if(user){
      const {error:mpErr} = await supabase.from('match_predictions').upsert({
        user_id:user.id,
        match_id:id,
        home_score:s.home,
        away_score:s.away,
        updated_at:new Date().toISOString()
      },{onConflict:'user_id,match_id'});
      console.log('Partido guardado:', mpErr ? 'ERROR: '+mpErr.message : 'OK match '+id);
    }
  };
  const compact = tweaks.density==='compacta';

  return (
    <>
      {screen==='loading' && <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'16px'}}>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="555 455 820 145" style={{height:'40px',width:'auto'}}>
          <text style={{fontFamily:"'Black Han Sans', sans-serif",fontSize:'120.46px',fill:'#ffffff'}} transform="translate(678.54 579.55)"><tspan x="0" y="0">PICK</tspan></text>
          <text style={{fontFamily:"'Black Han Sans', sans-serif",fontSize:'120.46px',fill:'#00E676'}} transform="translate(954.57 579.55)"><tspan x="0" y="0">BROS</tspan></text>
          <path fill="#00e676" d="M630.54,480.17h-53.54l-13.38,13.38v46.85c0,24.54,40.15,51.31,40.15,51.31,0,0,40.15-26.77,40.15-51.31v-46.85l-13.38-13.38ZM617,568.5c-3.38,3.38-8.06,5.48-13.23,5.48s-9.84-2.09-13.23-5.48c-3.38-3.39-5.48-8.06-5.48-13.23s2.09-9.84,5.48-13.23c3.39-3.38,8.06-5.48,13.23-5.48s9.84,2.09,13.23,5.48c3.38,3.38,5.48,8.06,5.48,13.23s-2.09,9.84-5.48,13.23Z"/>
        </svg>
        <div style={{color:'var(--sub)',fontSize:'0.8rem',letterSpacing:'0.1em'}}>CARGANDO...</div>
      </div>}
      {screen==='login'       && <div className="fu"><LoginScreen onLogin={handleLogin}/></div>}
      {screen==='predictions' && <div className="fu"><PredictionsWizard onComplete={handlePicks} initPicks={picks}/></div>}
      {screen==='main'        && (
        <div style={{display:'flex',flexDirection:'column',height:'100vh',height:'100dvh',overflow:'hidden',width:'100%'}}>
          <div style={{flex:1,overflowY:'scroll',WebkitOverflowScrolling:'touch',overscrollBehavior:'contain'}}>
            {tab==='matches'      && <MatchesScreen matchPreds={matchPreds} onMatchTap={(m)=>!isMatchLocked(m.date)&&setScoreModal(m)} scoreModal={scoreModal} onScoreConfirm={handleScore} onScoreClose={()=>setScoreModal(null)} compact={compact}/>}
            {tab==='predictions'  && <MyPredictionsScreen picks={picks} onEdit={()=>setScreen('predictions')}/>}
            {tab==='leaderboard'  && <LeaderboardScreen/>}
            {tab==='profile'      && <ProfileScreen user={user} picks={picks} matchPreds={matchPreds}/>}
          </div>
          <div style={{flexShrink:0}}>
            <BottomNav active={tab} onTab={setTab}/>
          </div>
        </div>
      )}

      {editMode && (
        <div style={{position:'fixed',bottom:'90px',right:'16px',zIndex:500,background:'#1c1c1e',border:'1px solid rgba(255,255,255,0.12)',borderRadius:'18px',padding:'18px',width:'220px',boxShadow:'0 12px 48px rgba(0,0,0,0.8)'}}>
          <div style={{fontWeight:800,color:'#f2f2f2',marginBottom:'18px',fontSize:'0.875rem'}}>Tweaks</div>
          <div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'0.63rem',color:'#8e8e93',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'10px',fontWeight:700}}>Color de acento</div>
            <div style={{display:'flex',gap:'10px'}}>
              {Object.entries(ACCENTS).map(([k,v])=>(
                <button key={k} onClick={()=>saveTw({...tweaks,accentColor:k})} title={k}
                  style={{width:'30px',height:'30px',borderRadius:'50%',background:v.a,border:tweaks.accentColor===k?'3px solid #fff':'3px solid transparent',cursor:'pointer',outline:'none',transition:'transform .15s',transform:tweaks.accentColor===k?'scale(1.2)':'scale(1)'}}/>
              ))}
            </div>
            <div style={{fontSize:'0.66rem',color:'#636366',marginTop:'6px'}}>{tweaks.accentColor==='verde'?'Verde Lima':tweaks.accentColor==='dorado'?'Dorado':'Azul Eléctrico'}</div>
          </div>
          <div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'0.63rem',color:'#8e8e93',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'10px',fontWeight:700}}>Densidad</div>
            <div style={{display:'flex',gap:'6px'}}>
              {[['comoda','Cómoda'],['compacta','Compacta']].map(([k,l])=>(
                <button key={k} onClick={()=>saveTw({...tweaks,density:k})}
                  style={{flex:1,padding:'7px',borderRadius:'10px',fontSize:'0.7rem',background:tweaks.density===k?(ACCENTS[tweaks.accentColor]||ACCENTS.verde).a:'#2c2c2e',border:'none',color:tweaks.density===k?'#000':'#ebebf5',cursor:'pointer',fontWeight:tweaks.density===k?800:400,outline:'none'}}>{l}</button>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:'0.63rem',color:'#8e8e93',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'8px',fontWeight:700}}>Ver pantalla</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
              {[['login','Login'],['predictions','Wizard'],['main','App']].map(([s,l])=>(
                <button key={s} onClick={()=>setScreen(s)} style={{padding:'6px 10px',borderRadius:'8px',fontSize:'0.7rem',background:'#2c2c2e',border:'none',color:'#ebebf5',cursor:'pointer',outline:'none'}}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
